name: Build Docker Images

on:
  # 允许在 Actions 页面手动运行
  workflow_dispatch:

  # 每周五 18:00 UTC 自动运行
  schedule:
    - cron: "0 18 * * 5"

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-images
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: v2ray
            context: ./docker/v2ray
            dockerfile: ./docker/v2ray/Dockerfile.architecture
            platforms: linux/386,linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64

          - image: xray
            context: ./docker/xray
            dockerfile: ./docker/xray/Dockerfile.architecture
            platforms: linux/386,linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64,linux/ppc64le,linux/s390x

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Prepare image name
        id: image
        shell: bash
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${{ matrix.image }}" \
            >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          pull: true

          # 防止缓存旧的 latest Release 下载结果
          no-cache: true

          tags: |
            ${{ steps.image.outputs.name }}:latest

          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.description=Latest stable ${{ matrix.image }} Docker image

          provenance: false